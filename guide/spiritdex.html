<style>

  header { padding: 2rem 2rem 1.25rem; border-bottom: 1px solid var(--border); }

  header p { color: var(--muted); margin: 0.4rem 0 0; font-size: 13px; }

  .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 10; }
  .controls input, .controls select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'Manrope', sans-serif; font-size: 13px; padding: 7px 10px; border-radius: 6px; outline: none;
  }
  .controls input:focus, .controls select:focus { border-color: var(--gold); }
  #search { flex: 1; min-width: 180px; }
  .count { color: var(--muted); font-size: 12px; align-self: center; margin-left: auto; }

  .table-wrap { overflow-x: auto; padding: 0 1rem 3rem; }
  table { border-collapse: collapse; width: 100%; min-width: 920px; }
  thead th {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--gold); background: var(--bg2); padding: 10px 8px; text-align: left;
    cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  thead th:hover { background: var(--bg3); }
  thead th.sorted-asc::after { content: ' \25B2'; color: var(--gold); }
  thead th.sorted-desc::after { content: ' \25BC'; color: var(--gold); }
  thead th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }

  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
  tbody tr:hover { background: rgba(242,200,107,0.06); }
  td { padding: 6px 8px; vertical-align: middle; }

  .sprite-cell { width: 44px; }
  .sprite-cell img { width: 36px; height: 36px; object-fit: contain; image-rendering: pixelated; display: block; }
  .name-cell { font-weight: 600; white-space: nowrap; }
  .id-cell { color: var(--muted); font-variant-numeric: tabular-nums; }

  .type-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-right: 3px; }
  .type-Neutral { background: rgba(200,200,200,0.18); color: #d6d6d6; }
  .type-Fire { background: rgba(255,90,40,0.2); color: #ff7a4d; }
  .type-Water { background: rgba(40,120,255,0.2); color: #6aa9ff; }
  .type-Grass { background: rgba(60,180,80,0.2); color: #5fd476; }
  .type-Electric { background: rgba(255,220,0,0.2); color: #f0de4a; }
  .type-Dark { background: rgba(120,60,170,0.22); color: #b07ee8; }
  .type-Poison { background: rgba(170,40,170,0.2); color: #e070e0; }
  .type-Ground { background: rgba(160,120,60,0.22); color: #cf9f5e; }
  .type-Light { background: rgba(255,255,180,0.18); color: #fcfca0; }
  .type-Wind { background: rgba(100,220,255,0.18); color: #8fe9ff; }
  .type-Metal { background: rgba(150,150,180,0.18); color: #c2c2da; }

  .obt-yes { color: #5fd476; font-size: 12px; }
  .obt-no { color: #e0707a; font-size: 12px; }
  .obt-yes.clickable { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
  .obt-yes.clickable:hover { color: var(--gold); }

  .total-bar-wrap { display: flex; align-items: center; gap: 6px; min-width: 110px; }
  .total-bar-bg { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .total-bar { height: 6px; background: var(--gold); }

  tr.row-clickable { cursor: pointer; }
  tr.row-clickable:hover { background: rgba(242,200,107,0.1); }

  @media (max-width: 680px) {
    header { padding: 1.25rem 1rem 1rem; }
    .controls { padding: 1rem; position: static; }
    thead th { position: static; top: auto; }
  }
</style>
</head>

const MAX_TOTAL = Math.max(...DATA.map(d => d.total));
const allTypes = [...new Set(DATA.flatMap(d => [d.type1, d.type2].filter(Boolean)))].sort();
const typeSelect = document.getElementById('typeFilter');
allTypes.forEach(t => {
  const opt = document.createElement('option');
  opt.value = t; opt.textContent = t;
  typeSelect.appendChild(opt);
});

let sortKey = 'id', sortDir = 1;

function typeTag(t) {
  return t ? `<span class="type-tag type-${t}">${t}</span>` : '';
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const typeF = typeSelect.value;
  const obtF = document.getElementById('obtainFilter').value;

  let rows = DATA.filter(d => {
    if (q && !d.name.toLowerCase().includes(q)) return false;
    if (typeF && d.type1 !== typeF && d.type2 !== typeF) return false;
    if (obtF === 'yes' && !d.obtainable) return false;
    if (obtF === 'no' && d.obtainable) return false;
    return true;
  });

  rows.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'name') { av = a.name; bv = b.name; }
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  document.getElementById('count').textContent = `${rows.length} / ${DATA.length} spirits`;

  const body = document.getElementById('dexBody');
  body.innerHTML = rows.map(d => {
    const hasQuests = d.obtainable && d.locations && d.locations.length > 0;
    return `
    <tr data-id="${d.id}" class="row-clickable">
      <td class="id-cell num">${d.id}</td>
      <td class="sprite-cell"><img src="sprites_all/${d.sprite}" alt="${d.name}" loading="lazy"></td>
      <td class="name-cell">${d.name}</td>
      <td>${typeTag(d.type1)}${typeTag(d.type2)}</td>
      <td>${d.category || '—'}</td>
      <td class="num">${d.hp}</td>
      <td class="num">${d.atk}</td>
      <td class="num">${d.def}</td>
      <td class="num">${d.satk}</td>
      <td class="num">${d.sdef}</td>
      <td class="num">${d.spd}</td>
      <td class="num">${d.int_}</td>
      <td class="num">
        <div class="total-bar-wrap">
          <span>${d.total}</span>
          <div class="total-bar-bg"><div class="total-bar" style="width:${(d.total / MAX_TOTAL * 100).toFixed(0)}%"></div></div>
        </div>
      </td>
      <td>${d.obtainable ? `<span class="obt-yes${hasQuests ? ' clickable' : ''}">Yes</span>` : '<span class="obt-no">No</span>'}</td>
    </tr>
  `;
  }).join('');

  body.querySelectorAll('tr.row-clickable').forEach(tr => {
    tr.addEventListener('click', () => { window.location.href = `spirit.html?id=${tr.dataset.id}`; });
  });
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) { sortDir *= -1; } else { sortKey = key; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    render();
  });
});

document.getElementById('search').addEventListener('input', render);
typeSelect.addEventListener('change', render);
document.getElementById('obtainFilter').addEventListener('change', render);

function syncControlsHeight() {
  const h = document.querySelector('.controls').offsetHeight;
  document.documentElement.style.setProperty('--controls-h', h + 'px');
}
window.addEventListener('resize', syncControlsHeight);
new ResizeObserver(syncControlsHeight).observe(document.querySelector('.controls'));
syncControlsHeight();

render();
</script>
