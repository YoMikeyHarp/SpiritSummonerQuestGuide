<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirit Summoner — Spirit Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090d;
    --gold: #f2c86b;
    --purple: #c9a9f5;
    --text: #ebe4f5;
    --muted: #cfc6e8aa;
    --card: rgba(255,255,255,0.12);
    --card-fill: rgba(255,255,255,0.92);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; }

  .phone-wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
  .phone-wrap::before {
    content: ''; position: absolute; inset: 0; z-index: -1; pointer-events: none;
    background: var(--hero-gradient, linear-gradient(160deg, #8a8a96, #5d5d68));
  }

  .hero {
    padding: 1.5rem 1.5rem 1.75rem; position: sticky; top: 0; z-index: 6; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; top: -40px; right: -60px; width: 240px; height: 240px;
    border-radius: 50%; background: rgba(255,255,255,0.08); pointer-events: none;
  }
  .back-btn {
    background: rgba(255,255,255,0.18); border: none; color: white; width: 34px; height: 34px;
    border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.2rem; text-decoration: none;
  }
  .back-btn:hover { background: rgba(255,255,255,0.3); }
  .hero-id { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }
  .hero-name { font-family: 'Cinzel', serif; color: white; font-size: 1.7rem; margin: 2px 0 10px; }
  .hero-types { display: flex; gap: 6px; margin-bottom: 1rem; position: relative; z-index: 1; }
  .pill { background: rgba(255,255,255,0.22); color: white; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }
  .hero-sprite-wrap { display: flex; justify-content: center; padding: 1rem 0 0.75rem; position: relative; z-index: 1; }
  .hero-sprite-wrap img { width: 220px; height: 220px; object-fit: contain; image-rendering: pixelated; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35)); }

  .tabs { display: flex; padding: 0 1.5rem; gap: 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.2); background: transparent; position: sticky; top: var(--hero-h, 320px); z-index: 5; backdrop-filter: blur(6px); }
  .tab-btn {
    background: none; border: none; color: rgba(255,255,255,0.65); font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
    padding: 14px 0 12px; cursor: pointer; border-bottom: 2px solid transparent; position: relative;
  }
  .tab-btn.active { color: white; border-bottom-color: white; }

  .panel { display: none; padding: 1.5rem; flex: 1; color: white; }
  .panel.active { display: block; }

  /* DETAILS */
  .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
  .detail-box { }
  .detail-label { font-size: 11px; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .detail-value { font-size: 14px; font-weight: 600; color: white; }
  .desc-text { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.75); margin-top: 0.5rem; }

  .section-title { font-family: 'Cinzel', serif; color: white; font-size: 13px; margin: 1.5rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.9; }
  .quest-card { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 0.6rem; backdrop-filter: blur(4px); }
  .quest-card .qc-area { font-family: 'Cinzel', serif; color: white; font-size: 12px; margin-bottom: 2px; opacity: 0.85; }
  .quest-card .qc-task { font-weight: 600; font-size: 13px; margin-bottom: 6px; color: white; }
  .quest-card .qc-row { display: flex; gap: 1rem; font-size: 12px; color: rgba(255,255,255,0.7); flex-wrap: wrap; }
  .quest-card .qc-row b { color: white; }
  .no-data { color: rgba(255,255,255,0.7); font-size: 13px; font-style: italic; }

  /* PANEL CARD (Stats / Skills look) */
  .stats-skills-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; padding: 0 1.5rem 1.25rem; }
  .panel-card {
    background: linear-gradient(160deg, #9fe0e6, #7cc9d6); border-radius: 16px;
    padding: 1rem 1.1rem 1.2rem; box-shadow: 0 6px 18px rgba(0,0,0,0.18); min-width: 0;
  }
  .panel-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; }
  .panel-card-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(10,40,45,0.65); font-weight: 700; }
  .panel-card-arrow { color: rgba(10,40,45,0.45); font-size: 14px; }

  @media (max-width: 420px) {
    .stats-skills-row { grid-template-columns: 1fr; }
  }

  /* MOVES */
  .hp-banner {
    background: linear-gradient(90deg, #4fc96a, #79e08e); border-radius: 20px; text-align: center;
    padding: 7px 0; font-weight: 700; font-size: 13px; color: white; margin-bottom: 1rem;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
  }
  .move-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; }
  .move-row:not(:last-child) { border-bottom: 1px solid rgba(10,40,45,0.1); }
  .move-bolt { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }
  .move-bolt.unlocked { color: #f2c200; }
  .move-bolt.locked { color: rgba(10,40,45,0.25); }
  .move-row-name { flex: 1; font-size: 13px; font-weight: 600; color: rgba(10,40,45,0.85); }
  .move-row.locked .move-row-name { color: rgba(10,40,45,0.35); }
  .move-row-power { font-size: 12px; font-weight: 700; color: rgba(10,40,45,0.7); display: flex; align-items: center; gap: 3px; }
  .move-row.locked .move-row-power { color: rgba(10,40,45,0.35); }
  .move-req { font-size: 10px; color: rgba(10,40,45,0.5); margin-left: 24px; margin-top: -2px; }

  /* STATUS (stat bars) */
  .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
  .stat-star { width: 14px; text-align: center; font-size: 12px; flex-shrink: 0; }
  .stat-star.has-bonus { color: #f2c200; }
  .stat-star.no-bonus { visibility: hidden; }
  .stat-name { width: 38px; font-size: 12px; font-weight: 700; color: rgba(10,40,45,0.7); flex-shrink: 0; }
  .stat-bar-bg { flex: 1; height: 9px; background: rgba(10,40,45,0.12); border-radius: 6px; overflow: hidden; }
  .stat-bar { height: 9px; border-radius: 6px; background: linear-gradient(90deg, #3a7bd5, #4f9cf2); }
  .stat-num { width: 32px; text-align: right; font-size: 12px; font-weight: 700; color: rgba(10,40,45,0.85); flex-shrink: 0; }
  .stat-total-row { display: flex; justify-content: space-between; margin-top: 0.5rem; padding-top: 0.6rem; border-top: 1px solid rgba(10,40,45,0.15); font-weight: 700; color: rgba(10,40,45,0.85); font-size: 13px; }

  /* EVOLUTIONS */
  .evo-chain { display: flex; align-items: center; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }
  .evo-node { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .evo-node img { width: 64px; height: 64px; object-fit: contain; image-rendering: pixelated; }
  .evo-node.current img { outline: 2px solid white; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .evo-node-name { font-size: 12px; font-weight: 600; color: white; }
  .evo-arrow-col { display: flex; flex-direction: column; align-items: center; gap: 2px; color: rgba(255,255,255,0.7); font-size: 10px; }
  .evo-arrow-col .arrow { color: white; font-size: 18px; }
  .evo-node.clickable { cursor: pointer; }
  .evo-node.clickable:hover .evo-node-name { text-decoration: underline; }

  a.evo-link { text-decoration: none; color: inherit; }
</style>
</head>

<div class="phone-wrap">

    <div class="section-title">Where to Find</div>

  </div>

  <div class="panel" id="panel-evolutions">

    <div id="dEvolutions"></div>
  </div>
</div>

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const d = DATA.find(x => x.id === id);

if (!d) {
  document.body.innerHTML = '<div style="padding:2rem;color:#ebe4f5;font-family:Manrope,sans-serif;">Spirit not found. <a href="spiritdex.html" style="color:#f2c86b;">Back to Spiritdex</a></div>';
} else {
  document.title = `${d.name} — Spirit Summoner`;
  document.documentElement.style.setProperty('--hero-gradient', TYPE_GRADIENTS[d.type1] || TYPE_GRADIENTS.Neutral);
  document.getElementById('heroId').textContent = '#' + String(d.id).padStart(3, '0');
  document.getElementById('heroName').textContent = d.name;
  document.getElementById('heroSprite').src = `sprites_all/${d.sprite}`;
  document.getElementById('heroSprite').alt = d.name;

  const typesHtml = [d.type1, d.type2].filter(Boolean).map(t => `<span class="pill">${t}</span>`).join('');
  document.getElementById('heroTypes').innerHTML = typesHtml;

  // DETAILS TAB
  document.getElementById('dCategory').textContent = [d.category, d.category2].filter(Boolean).join(' / ') || '—';
  document.getElementById('dTotal').textContent = d.total;
  document.getElementById('dObtainable').textContent = d.obtainable ? 'Yes' : 'No';
  document.getElementById('dUnique').textContent = d.isUnique ? 'Yes' : 'No';

  const questsEl = document.getElementById('dQuests');
  if (d.locations && d.locations.length) {
    questsEl.innerHTML = d.locations.map(loc => `
      <div class="quest-card">
        <div class="qc-area">${loc.area}</div>
        <div class="qc-task">${loc.task}</div>
        <div class="qc-row">
          <span>Enemy Level: <b>${loc.level}</b></span>
          <span>Energy Cost: <b>${loc.energy}</b></span>
          <span>XP Reward: <b>${loc.xp.toLocaleString()}</b></span>
          <span>Gold Reward: <b>${loc.gold.toLocaleString()}</b></span>
        </div>
      </div>
    `).join('');
  } else if (d.preEvoId) {
    questsEl.innerHTML = `<div class="no-data">Not found wild — obtained by evolving ${d.preEvoName}.</div>`;
  } else {
    questsEl.innerHTML = `<div class="no-data">Not found in extracted quest data (may be shop/event/unique only).</div>`;
  }

  // MOVES TAB ("Skills" card)
  const movesEl = document.getElementById('dMoves');
  if (d.moves && d.moves.length) {
    const sortedMoves = [...d.moves].sort((a, b) => {
      const aLocked = a.item ? 1 : 0, bLocked = b.item ? 1 : 0;
      if (aLocked !== bLocked) return aLocked - bLocked;
      return a.power - b.power;
    });
    movesEl.innerHTML = sortedMoves.map(m => {
      const locked = !!m.item;
      const reqText = locked
        ? `Lv.${m.spiritLv}+ &middot; ${m.item}${m.itemCount > 1 ? ' x' + m.itemCount : ''}`
        : `Lv.${m.spiritLv}+ &middot; no item required`;
      return `
      <div class="move-row ${locked ? 'locked' : ''}">
        <span class="move-bolt ${locked ? 'locked' : 'unlocked'}">⚡</span>
        <span class="move-row-name">${m.name}</span>
        <span class="move-row-power">⚔ ${m.power}</span>
      </div>
      <div class="move-req">${reqText}</div>
    `;
    }).join('');
  } else {
    movesEl.innerHTML = `<div class="no-data">No learnable moves found.</div>`;
  }

  // STATUS TAB ("Stats" card)
  const hasBonus = (key) => d[`bonus${key}`] > 1;
  const statDefs = [
    ['ATK', d.atk, hasBonus('Atk')], ['DEF', d.def, hasBonus('Def')], ['MGK', d.satk, hasBonus('Satk')],
    ['MDF', d.sdef, hasBonus('Sdef')], ['SPD', d.spd, hasBonus('Spd')], ['INT', d.int_, hasBonus('Int')]
  ];
  const maxStat = 250;
  document.getElementById('dStats').innerHTML =
    `<div class="hp-banner">${d.hp} HP</div>` +
    statDefs.map(([label, val, starred]) => `
    <div class="stat-row">
      <span class="stat-star ${starred ? 'has-bonus' : 'no-bonus'}">★</span>
      <span class="stat-name">${label}</span>
      <div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100, val / maxStat * 100)}%"></div></div>
      <span class="stat-num">${val}</span>
    </div>
  `).join('') + `<div class="stat-total-row"><span>Total</span><span>${d.total}</span></div>`;

  // EVOLUTIONS TAB
  function buildChain(spirit) {
    let chain = [spirit];
    let cur = spirit;
    while (cur.preEvoId) {
      const p = DATA.find(x => x.id === cur.preEvoId);
      if (!p) break;
      chain.unshift(p);
      cur = p;
    }
    cur = spirit;
    while (cur.evoId) {
      const n = DATA.find(x => x.id === cur.evoId);
      if (!n) break;
      chain.push(n);
      cur = n;
    }
    return chain;
  }

  const chain = buildChain(d);
  const evoEl = document.getElementById('dEvolutions');
  if (chain.length === 1) {
    evoEl.innerHTML = `<div class="no-data">${d.name} does not evolve.</div>`;
  } else {
    let html = '<div class="evo-chain">';
    chain.forEach((s, i) => {
      const isCurrent = s.id === d.id;
      html += `<a class="evo-link" href="spirit.html?id=${s.id}"><div class="evo-node ${isCurrent ? 'current' : 'clickable'}">
        <img src="sprites_all/${s.sprite}" alt="${s.name}">
        <span class="evo-node-name">${s.name}</span>
      </div></a>`;
      if (i < chain.length - 1) {
        const next = chain[i + 1];
        const req = next.evoLevel ? `Lv.${next.evoLevel}` : '';
        html += `<div class="evo-arrow-col"><span class="arrow">→</span>${req ? `<span>${req}</span>` : ''}</div>`;
      }
    });
    html += '</div>';
    evoEl.innerHTML = html;
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

function syncHeroHeight() {
  const hero = document.querySelector('.hero');
  if (!hero) return;
  document.documentElement.style.setProperty('--hero-h', hero.offsetHeight + 'px');
}
window.addEventListener('resize', syncHeroHeight);
new ResizeObserver(syncHeroHeight).observe(document.querySelector('.hero'));
syncHeroHeight();
</script>
</body>
</html>
